name: QA Automation Pipeline CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Start FastAPI App
        run: |
          # Start uvicorn in background
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          # Wait for app to be ready
          npx wait-on http://localhost:8000/docs
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Trigger Pipeline
        run: |
          echo "Triggering pipeline with shared/demo/request.json..."
          curl -X POST http://localhost:8000/pipeline/run \
            -H "Content-Type: application/json" \
            -d @shared/demo/request.json \
            --fail
          echo "Pipeline run completed."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: playwright/package-lock.json

      - name: Install Playwright dependencies
        working-directory: playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: playwright
        run: |
          npx playwright test

      - name: Generate Allure Report
        if: always()
        working-directory: playwright
        run: |
          npm install -g allure-commandline --loglevel error
          allure generate allure-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        if: always() && github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright/allure-report

      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: playwright/allure-report
          retention-days: 7

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright/playwright-report
          retention-days: 7
